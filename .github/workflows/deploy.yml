name: deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'tailwind.config.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build
        env:
          PUBLIC_ETHICALADS_PUBLISHER: ${{ vars.PUBLIC_ETHICALADS_PUBLISHER }}

      - name: rsync to hetzner
        if: ${{ secrets.HETZNER_SSH_KEY != '' }}
        env:
          HETZNER_HOST: ${{ secrets.HETZNER_HOST }}
          HETZNER_USER: ${{ secrets.HETZNER_USER }}
          HETZNER_PATH: ${{ secrets.HETZNER_PATH }}
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HETZNER_HOST" >> ~/.ssh/known_hosts
          rsync -avz --delete dist/ "$HETZNER_USER@$HETZNER_HOST:$HETZNER_PATH/"
